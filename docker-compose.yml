services:
  postgres:
    image: postgres:16-alpine
    container_name: todak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todak}
      POSTGRES_USER: ${POSTGRES_USER:-todak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todak}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todak} -d ${POSTGRES_DB:-todak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: todak-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CI: "true"
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-todak}:${POSTGRES_PASSWORD:-todak}@postgres:5432/${POSTGRES_DB:-todak}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "corepack enable pnpm && pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: todak-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-todak}:${POSTGRES_PASSWORD:-todak}@postgres:5432/${POSTGRES_DB:-todak}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVEN_API_KEY: ${ELEVEN_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./agent/src:/app/src
    command: ["uv", "run", "agent", "dev"]

volumes:
  postgres_data:
